<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FileToPDF — Universal File Converter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    /* ─── RESET & THEME ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08080a;
      --surface: #111115;
      --card: #1c1c22;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #7c6af7;
      --accent-glow: rgba(124, 106, 247, 0.3);
      --accent2: #5de0b3;
      --danger: #f76a6a;
      --text: #ffffff;
      --muted: #8e8e9e;
      --radius-lg: 28px;
      --radius-md: 16px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ─── DECORATIVE BACKGROUND ─── */
    .glow {
      position: fixed;
      width: 40vw; height: 40vw;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      top: -10vw; right: -10vw;
      z-index: -1; opacity: 0.5;
    }

    /* ─── HEADER ─── */
    header {
      width: 100%; max-width: 900px;
      padding: 80px 24px 40px;
      text-align: center;
    }

    .logo {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 100px; padding: 6px 16px; margin-bottom: 24px;
    }
    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); box-shadow: 0 0 10px var(--accent2); }
    .logo span { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.1em; }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.5rem, 8vw, 4rem);
      line-height: 1; margin-bottom: 20px;
      background: linear-gradient(to bottom, #fff 50%, var(--muted));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* ─── DROP ZONE ─── */
    .main-card { width: 100%; max-width: 800px; padding: 0 24px 80px; }

    #drop-zone {
      position: relative;
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      padding: 60px 40px;
      text-align: center;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
    }

    #drop-zone:hover { border-color: var(--accent); background: rgba(124, 106, 247, 0.02); transform: translateY(-2px); }
    #drop-zone.drag-over { border-color: var(--accent2); background: rgba(93, 224, 179, 0.05); transform: scale(0.99); }

    .drop-icon { font-size: 48px; margin-bottom: 16px; display: block; }
    .drop-title { font-family: 'Syne', sans-serif; font-size: 1.5rem; margin-bottom: 8px; }

    /* ─── VISIBLE FILE TYPES GRID ─── */
    .format-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 12px;
      margin-top: 40px;
      padding-top: 30px;
      border-top: 1px solid var(--border);
    }

    .format-category { display: flex; flex-direction: column; gap: 8px; }
    .format-category label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
    .chip {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 11px; font-weight: 600; color: var(--text);
      transition: 0.2s;
    }
    #drop-zone:hover .chip { border-color: rgba(124, 106, 247, 0.3); }

    /* ─── FILE LIST ─── */
    #file-list { margin-top: 24px; display: grid; gap: 12px; }
    .file-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 16px;
      display: flex; align-items: center; gap: 16px;
      animation: slideIn 0.3s ease forwards;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .file-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }

    .file-info { flex: 1; min-width: 0; }
    .file-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-size { font-size: 0.8rem; color: var(--muted); }

    .progress-bar-wrap { height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 10px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s ease; }

    /* ─── ACTIONS ─── */
    #action-row {
      margin-top: 30px; padding: 20px;
      background: var(--surface); border-radius: var(--radius-md);
      display: flex; justify-content: space-between; align-items: center;
    }

    .btn {
      padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; transition: 0.2s;
    }
    .btn-primary { background: var(--accent); color: white; box-shadow: 0 4px 15px var(--accent-glow); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--accent-glow); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: rgba(255,255,255,0.05); color: #fff; }

    footer { margin-top: auto; padding: 40px; color: var(--muted); font-size: 0.8rem; }
    footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>

  <div class="glow"></div>

  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      <span>SECURE CLOUD CONVERTER</span>
    </div>
    <h1>Any File.<br>One PDF.</h1>
  </header>

  <main class="main-card">
    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" multiple hidden accept=".docx,.xlsx,.pptx,.txt,.jpg,.jpeg,.png,.gif,.webp,.md,.html" />
      
      <span class="drop-icon">🚀</span>
      <p class="drop-title">Ready to Convert?</p>
      <p class="drop-sub" style="color: var(--muted); font-size: 0.95rem;">Drag & drop files here or click to browse</p>

      <div class="format-grid">
        <div class="format-category">
          <label>Office</label>
          <div class="chips">
            <span class="chip">DOCX</span>
            <span class="chip">XLSX</span>
            <span class="chip">PPTX</span>
          </div>
        </div>
        <div class="format-category">
          <label>Images</label>
          <div class="chips">
            <span class="chip">JPG</span>
            <span class="chip">PNG</span>
            <span class="chip">WEBP</span>
          </div>
        </div>
        <div class="format-category">
          <label>Web & Text</label>
          <div class="chips">
            <span class="chip">TXT</span>
            <span class="chip">MD</span>
            <span class="chip">HTML</span>
          </div>
        </div>
      </div>
    </div>

    <div id="file-list"></div>

    <div id="action-row" style="display:none;">
      <span id="file-count-label" style="font-size: 0.9rem; font-weight: 600;">0 files selected</span>
      <div style="display:flex; gap:12px;">
        <button class="btn btn-ghost" onclick="clearAll()">Clear All</button>
        <button class="btn btn-primary" id="convert-btn" onclick="startConversion()">Convert to PDF</button>
      </div>
    </div>

    <div id="summary" style="display:none; margin-top: 24px; text-align: center; color: var(--accent2);">
      <p style="font-weight: 700;">✓ Conversion Complete! Check your downloads.</p>
    </div>
  </main>

  <footer>
    Built with Precision • <a href="https://github.com/zaifidev7/pdf-converter" target="_blank">View Source</a>
  </footer>

  <script>
    // Integration logic from your original script
    let fileQueue = [];
    let conversionRunning = false;

    function getFileIcon(name) {
      const ext = name.split('.').pop().toLowerCase();
      const map = {
        docx: ['📝', 'rgba(37,99,235,0.1)'],
        xlsx: ['📊', 'rgba(22,163,74,0.1)'],
        pptx: ['📋', 'rgba(234,88,12,0.1)'],
        txt:  ['📄', 'rgba(124,106,247,0.1)'],
        md:   ['📄', 'rgba(124,106,247,0.1)'],
        html: ['🌐', 'rgba(234,179,8,0.1)'],
        jpg:  ['🖼️', 'rgba(236,72,153,0.1)'],
        png:  ['🖼️', 'rgba(236,72,153,0.1)'],
        webp: ['🖼️', 'rgba(236,72,153,0.1)'],
      };
      return map[ext] || ['📎', 'rgba(142,142,158,0.1)'];
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function addFiles(files) {
      Array.from(files).forEach(file => {
        if (fileQueue.some(f => f.file.name === file.name)) return;
        fileQueue.push({ file, id: Math.random().toString(36).substr(2, 9), status: 'queued' });
      });
      renderFileList();
      updateActionRow();
    }

    function renderFileList() {
      const list = document.getElementById('file-list');
      list.innerHTML = '';
      fileQueue.forEach(item => {
        const [icon, iconBg] = getFileIcon(item.file.name);
        const el = document.createElement('div');
        el.className = 'file-item';
        el.innerHTML = `
          <div class="file-icon" style="background:${iconBg}">${icon}</div>
          <div class="file-info">
            <div class="file-name">${item.file.name}</div>
            <div class="file-size">${formatSize(item.file.size)}</div>
            <div class="progress-bar-wrap" id="pb-wrap-${item.id}" style="display:none">
              <div class="progress-bar-fill" id="pb-${item.id}"></div>
            </div>
          </div>
          <button class="btn btn-ghost" style="padding: 8px; border:none;" onclick="removeFile('${item.id}')">✕</button>
        `;
        list.appendChild(el);
      });
    }

    function updateActionRow() {
      const row = document.getElementById('action-row');
      row.style.display = fileQueue.length > 0 ? 'flex' : 'none';
      document.getElementById('file-count-label').textContent = `${fileQueue.length} files selected`;
    }

    function removeFile(id) {
      fileQueue = fileQueue.filter(f => f.id !== id);
      renderFileList();
      updateActionRow();
    }

    function clearAll() {
      fileQueue = [];
      renderFileList();
      updateActionRow();
      document.getElementById('summary').style.display = 'none';
    }

    // Drag & Drop
    const dropZone = document.getElementById('drop-zone');
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      addFiles(e.dataTransfer.files);
    });

    document.getElementById('file-input').addEventListener('change', e => {
      addFiles(e.target.files);
      e.target.value = '';
    });
    
    // (Conversion function startConversion omitted for brevity - use your existing fetch logic here)
  </script>
</body>
</html>
